specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SnapLogic
providerId: snaplogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AI
  - API Management
  - Integration
  - iPaaS
description: SnapLogic does not publish self-serve pricing for its Intelligent Integration Platform. The
  pricing page links to a "Request a Demo" / "Contact Us" call-to-action only; tier names, per-Snap or
  per-pipeline prices, and minimums are quoted by the SnapLogic sales team.
sources:
  - https://www.snaplogic.com/products
notes: SnapLogic publishes no public price list, plan SKUs, or self-serve tier on snaplogic.com. All editions
  (Integration, AgentCreator, SnapGPT, API Management) require contacting the SnapLogic sales team for
  a custom quote, so this artifact is intentionally limited to a single Contact Sales plan and reconciled
  is false.
plans:
  - id: snaplogic-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted SnapLogic Intelligent Integration Platform subscription. Pricing is sized
      against the customer's Snap consumption, environment count, and platform modules (iPaaS, API Management,
      AgentCreator, SnapGPT) and is provided by the SnapLogic sales team on request.
    entries:
      - label: Platform Subscription
        name: platform_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: SnapLogic Intelligent Integration Platform
      - name: Application & Data Integration
      - name: API Management
      - name: AgentCreator
      - name: SnapGPT
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
