apis:
  - aid: snaplogic:snaplogic-public-apis
    name: SnapLogic Public APIs
    tags:
      - Integration
      - iPaaS
      - Automation
    humanURL: https://docs.snaplogic.com/public-apis/public-apis-about.html
    properties:
      - url: https://docs.snaplogic.com/public-apis/public-apis-about.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-asset.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-runtime.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-project.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-apim.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-user-and-group.html
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/entra-id-configuration.html
        type: Authentication
    description: >-
      SnapLogic Public APIs provide programmatic management for your environment
      and project assets. The APIs cover activity tracking, asset management,
      asset catalog and lineage, log retrieval, runtime and pipeline execution
      control, task management, project and Git operations, Snaplex
      infrastructure management, Snap statistics, API Management lifecycle, and
      user and group administration. The platform authenticates API calls with
      basic authentication and JSON Web Token (JWT) over HTTPS.
  - aid: snaplogic:snaplogic-api-management
    name: SnapLogic API Management
    tags:
      - API Management
      - API Gateway
      - API Lifecycle
    humanURL: https://www.snaplogic.com/products/api-management-development
    properties:
      - url: https://www.snaplogic.com/products/api-management-development
        type: Documentation
      - url: https://docs.snaplogic.com/public-apis/apis-apim.html
        type: Documentation
      - url: https://docs.snaplogic.com/api-m/reference/generic-oauth2.html
        type: Documentation
      - url: https://docs.snaplogic.com/monitor/observe-api-metrics.html
        type: Documentation
    description: >-
      SnapLogic API Management enables organizations to create, manage, secure,
      and monitor APIs throughout their lifecycle. It supports exposing SnapLogic
      pipelines as APIs or creating APIs from an OpenAPI specification, applying
      security policies, managing versions, publishing to a customizable
      developer portal, and monitoring API metrics and performance across
      on-premises, hybrid, and cloud environments.
  - aid: snaplogic:snaplogic-snap-development
    name: SnapLogic Snap Development SDK
    tags:
      - SDK
      - Development
      - Integration
    humanURL: https://developer.snaplogic.com/
    properties:
      - url: https://developer.snaplogic.com/
        type: Documentation
      - url: https://github.com/SnapLogic/developer.snaplogic.com
        type: GitHubOrganization
    description: >-
      The SnapLogic Snap Development SDK provides a Java-based framework for
      building custom Snaps for the SnapLogic Intelligent Integration Platform.
      Snaps are streaming data processors that consume and produce Binary or
      Document data through input and output views. The SDK supports property
      configuration, expression language, binary and document data handling,
      input schema validation, error view handling, and unit testing.
  - aid: snaplogic:snaplogic
    name: SnapLogic
    tags:
      - API
    humanURL: ' https://www.snaplogic.com/'
    properties:
      - url: ' https://www.snaplogic.com/'
        type: Documentation
    description: >-
      Our AI-powered, all-in-one generative integration platform unifies your
      data and streamlines workflows to transform your business.
