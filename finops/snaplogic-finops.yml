specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: SnapLogic
providerId: snaplogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - iPaaS
  - Integration
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps placeholder for SnapLogic: pricing is contact-sales only, so meter
  units and FOCUS columns are scoped to what is publicly known about the Intelligent Integration Platform.'
sources:
  - https://www.snaplogic.com/products
notes: SnapLogic does not publish a per-Snap or per-pipeline price list, so meter unit prices and FOCUS
  PricingUnit values cannot be reconciled here. Update once a customer order form or public price sheet
  is available.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: SnapLogic, Inc.
serviceCategory: Integration Platform
billingModel:
  pricingCategory: Subscription (Contact Sales)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: SnapLogic Intelligent Integration Platform
  ServiceCategory: Integration Platform
  ProviderName: SnapLogic
  PublisherName: SnapLogic, Inc.
  InvoiceIssuerName: SnapLogic, Inc.
  BillingCurrency: USD
meters:
  - name: snap_executions
    unit: varies
    aggregation: sum
    dimensions:
      - environment
      - snaplex
  - name: pipeline_runs
    unit: run
    aggregation: count
    dimensions:
      - environment
      - project
principles:
  - name: Visibility
    description: Use SnapLogic Manager dashboards and the SnapLogic monitoring API to track Snap executions
      and pipeline runs per project and environment.
  - name: Allocation
    description: Map SnapLogic projects, organizations, and Snaplex nodes to internal cost centers; tag
      pipelines so usage can be attributed back to the consuming team.
  - name: Optimization
    description: Right-size Snaplex node count, consolidate low-volume pipelines, and use scheduled vs.
      ultra pipelines deliberately to control execution cost.
  - name: Accountability
    description: Identify a tenant administrator responsible for reconciling SnapLogic invoices against
      monitored Snap execution volume each billing period.
maintainers:
