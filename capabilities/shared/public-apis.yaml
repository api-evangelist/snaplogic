naftiko: "1.0.0-alpha1"

info:
  label: "SnapLogic Public APIs"
  description: >-
    The SnapLogic Public APIs provide programmatic management for integration
    environments, pipeline execution control, asset management, user and group
    administration, and Snaplex infrastructure management. Authenticated via JWT
    or basic authentication.
  tags:
    - API Management
    - Automation
    - Integration
    - iPaaS
    - SnapLogic
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SNAPLOGIC_JWT_TOKEN: SNAPLOGIC_JWT_TOKEN
      SNAPLOGIC_ORG: SNAPLOGIC_ORG

capability:
  consumes:
    - type: http
      namespace: snaplogic-api
      baseUri: https://{{SNAPLOGIC_ORG}}.snaplogic.com/api/1
      description: "SnapLogic Public APIs for platform management and pipeline execution"
      authentication:
        type: bearer
        token: "{{SNAPLOGIC_JWT_TOKEN}}"
      resources:
        - name: pipeline-executions
          path: /runtime/{{SNAPLOGIC_ORG}}
          description: "List and manage pipeline executions"
          operations:
            - name: list-pipeline-executions
              method: GET
              description: "List Pipeline Executions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pipeline-execution
          path: /runtime/{{SNAPLOGIC_ORG}}/{ruuid}
          description: "Manage a specific pipeline execution"
          operations:
            - name: get-pipeline-execution
              method: GET
              description: "Get Pipeline Execution"
              inputParameters:
                - name: ruuid
                  in: path
                  type: string
                  required: true
                  description: "Runtime UUID of the pipeline execution"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: stop-pipeline
          path: /runtime/stop/{{SNAPLOGIC_ORG}}/{ruuid}
          description: "Stop a running pipeline"
          operations:
            - name: stop-pipeline-execution
              method: POST
              description: "Stop Pipeline Execution"
              inputParameters:
                - name: ruuid
                  in: path
                  type: string
                  required: true
                  description: "Runtime UUID of the pipeline execution"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: execution-metrics
          path: /runtime/apistats/{{SNAPLOGIC_ORG}}
          description: "Retrieve execution performance metrics"
          operations:
            - name: get-execution-metrics
              method: GET
              description: "Get Execution Metrics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: asset-acl
          path: /assetapi/acl/{path}
          description: "Manage asset access control"
          operations:
            - name: get-asset-privileges
              method: GET
              description: "Get Asset Privileges"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the asset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: grant-asset-access
              method: POST
              description: "Grant Asset Access"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the asset"
              body:
                type: json
                data:
                  perms: "{{tools.perms}}"
                  users: "{{tools.users}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: projects
          path: /assetapi/project/{path}
          description: "Manage projects and project spaces"
          operations:
            - name: create-project
              method: POST
              description: "Create Project"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path for the new project"
              body:
                type: json
                data:
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-project
              method: DELETE
              description: "Delete Project"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the project to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: snaplogic-public-api
      resources:
        - path: /v1/executions
          name: executions
          description: "List pipeline executions"
          operations:
            - method: GET
              name: list-executions
              description: "List Pipeline Executions"
              call: "snaplogic-api.list-pipeline-executions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: snaplogic-public-mcp
      transport: http
      tools:
        - name: list-pipeline-executions
          description: "List running and recent pipeline executions in the SnapLogic organization"
          hints:
            readOnly: true
            openWorld: false
          call: "snaplogic-api.list-pipeline-executions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pipeline-execution
          description: "Get details of a specific SnapLogic pipeline execution by UUID"
          hints:
            readOnly: true
            openWorld: false
          call: "snaplogic-api.get-pipeline-execution"
          with:
            ruuid: "tools.ruuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-pipeline-execution
          description: "Stop a running SnapLogic pipeline execution"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "snaplogic-api.stop-pipeline-execution"
          with:
            ruuid: "tools.ruuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-execution-metrics
          description: "Retrieve pipeline execution performance metrics for the SnapLogic organization"
          hints:
            readOnly: true
            openWorld: false
          call: "snaplogic-api.get-execution-metrics"
          outputParameters:
            - type: object
              mapping: "$."
