specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SnapLogic
providerId: snaplogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - iPaaS
  - Integration
  - Rate Limiting
description: SnapLogic does not publish per-second / per-minute platform-wide rate-limit numbers on its
  public website. Rate-limit behavior depends on the customer's Snaplex sizing and any SnapLogic API
  Management policies the customer configures on their own published APIs. Treat this artifact as a placeholder
  until contractual TPS commitments or a public limits page are provided.
sources:
  - https://www.snaplogic.com/products
notes: No public rate-limit numbers are published by SnapLogic. Throughput and concurrency are negotiated
  during the subscription quote and depend on Snaplex sizing.
responseCodes:
  throttled: 429
limits:
  - name: Customer-defined API Management policy limits
    scope: account/policy
    metric: varies
    limit: 'see SnapLogic API Management policy configuration'
policies:
  - name: Contact Sales
    description: Platform throughput, concurrent pipeline execution, and Snaplex node sizing are negotiated
      with SnapLogic during the subscription quote. Specific TPS / concurrency commitments live in the
      customer's order form, not in public docs.
maintainers:
